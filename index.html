<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow Field Dashes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Generative flow field dash artwork">
      <section class="stage" aria-label="Animated artwork">
        <canvas id="art" width="1400" height="1400"></canvas>
      </section>

      <aside class="panel" aria-label="Artwork controls">
        <div>
          <p class="eyebrow">Generative study</p>
          <h1>Flow Field Dashes</h1>
        </div>

        <div class="control-row">
          <button id="pauseButton" type="button">Pause</button>
          <button id="randomizeButton" type="button">Randomize</button>
          <button id="exportButton" type="button">Export PNG</button>
          <button id="exportSvgButton" type="button">Export SVG</button>
        </div>

        <div class="preset-box" aria-label="Saved configurations">
          <label>
            <span>Preset name</span>
            <input id="presetName" type="text" placeholder="Soft vortex" />
          </label>

          <div class="control-row">
            <button id="savePresetButton" type="button">Save</button>
            <button id="sharePresetButton" type="button">Share URL</button>
          </div>

          <label>
            <span>Saved presets</span>
            <select id="presetSelect">
              <option value="">No saved presets</option>
            </select>
          </label>

          <div class="control-row">
            <button id="loadPresetButton" type="button">Load</button>
            <button id="deletePresetButton" type="button">Delete</button>
          </div>

          <p id="presetStatus" class="status" aria-live="polite"></p>
        </div>

        <label>
          <span>Pattern</span>
          <select id="pattern">
            <option value="flow">Flow field</option>
            <option value="radial">Radial spokes</option>
            <option value="rings">Concentric waves</option>
            <option value="waves">Traveling waves</option>
            <option value="vortex">Vortex</option>
          </select>
        </label>

        <label>
          <span>Speed</span>
          <div class="slider-control">
            <input id="speed" type="range" min="0" max="2" step="0.01" value="0.72" />
            <input id="speedNumber" type="number" min="0" max="2" step="0.01" value="0.72" aria-label="Speed value" />
          </div>
        </label>

        <label>
          <span>Organic easing</span>
          <div class="slider-control">
            <input id="easing" type="range" min="0" max="1" step="0.01" value="0.32" />
            <input id="easingNumber" type="number" min="0" max="1" step="0.01" value="0.32" aria-label="Organic easing value" />
          </div>
        </label>

        <label>
          <span>Field pull</span>
          <div class="slider-control">
            <input id="fieldPull" type="range" min="0.2" max="2.4" step="0.01" value="1.2" />
            <input id="fieldPullNumber" type="number" min="0.2" max="2.4" step="0.01" value="1.2" aria-label="Field pull value" />
          </div>
        </label>

        <label>
          <span>Wave scale</span>
          <div class="slider-control">
            <input id="waveScale" type="range" min="0.7" max="3.8" step="0.01" value="1.85" />
            <input id="waveScaleNumber" type="number" min="0.7" max="3.8" step="0.01" value="1.85" aria-label="Wave scale value" />
          </div>
        </label>

        <label>
          <span>Grid density</span>
          <div class="slider-control">
            <input id="density" type="range" min="14" max="34" step="1" value="24" />
            <input id="densityNumber" type="number" min="14" max="34" step="1" value="24" aria-label="Grid density value" />
          </div>
        </label>
      </aside>
    </main>

    <script src="./src/main.js"></script>
  </body>
</html>
